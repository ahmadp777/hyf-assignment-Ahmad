<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Screenshot Saver</title>
    <link rel="stylesheet" href="screen.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>URL Screenshot Saver</h1>
            <p>Capture and save screenshots of any website</p>
        </header>

        <!-- Error messages display here -->
        <div id="error-container"></div>

        <!-- Form for URL input and capture -->
        <section id="form-container" class="form-section"></section>

        <!-- List of saved screenshots -->
        <section class="screenshots-section">
            <h2>Saved Screenshots</h2>
            <div id="screenshot-list"></div>
        </section>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
